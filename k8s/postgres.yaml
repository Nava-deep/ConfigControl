apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: config-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: configdb
            - name: POSTGRES_USER
              value: config
            - name: POSTGRES_PASSWORD
              value: config
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: config-service
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
