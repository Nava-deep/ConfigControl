apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-control-plane
  namespace: config-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-control-plane
  template:
    metadata:
      labels:
        app: config-control-plane
    spec:
      containers:
        - name: api
          image: config-control-plane:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CONFIG_SERVICE_DATABASE_URL
              value: postgresql+psycopg://config:config@postgres:5432/configdb
            - name: CONFIG_SERVICE_REDIS_URL
              value: redis://redis:6379/0
            - name: CONFIG_SERVICE_USE_REDIS
              value: "true"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: config-control-plane
  namespace: config-service
spec:
  selector:
    app: config-control-plane
  ports:
    - port: 80
      targetPort: 8080
